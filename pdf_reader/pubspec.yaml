name: pdf_reader
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

   # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.0.0

  # PDF Viewing & Generation
  syncfusion_flutter_pdfviewer: ^31.1.19
  syncfusion_flutter_pdf: ^31.1.19
  pdf: ^3.11.1

  # File Handling
  file_picker: ^10.3.8
  open_filex: ^4.5.0
  path_provider: ^2.1.4
  path: ^1.9.0
  share_plus: ^12.0.2
  saver_gallery: ^4.1.1

  # Responsive
  flutter_screenutil: ^5.9.3

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Conversion
  image: ^4.2.0
  archive: ^3.6.1
  csv: ^6.0.0
  excel: ^4.0.3

  # DI
  get_it: ^9.2.1
  injectable: ^2.4.4

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0
  permission_handler: ^12.0.1
  intl: ^0.20.2
  uuid: ^4.5.1
  mime: ^2.0.0
  pdfx: ^2.6.0 
  docx_to_text: ^1.0.1 
  google_mlkit_text_recognition: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/file.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#164957"   # ← adds Android adaptive icon with your brand color
  adaptive_icon_foreground: "assets/file.png"
  web:
    generate: true
    image_path: "assets/file.png"
    background_color: "#164957"
    theme_color: "#164957"
  windows:
    generate: true
    image_path: "assets/file.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/file.png"

flutter:
  uses-material-design: true


  assets:
    - assets/